name: "Eufy Lock Bridge"
version: "0.2.0"
slug: "eufy_lock_bridge"
description: "HTTP bridge for controlling Eufy locks not yet fully supported by eufy-security-ws (e.g. T85D0), with a cloud-API fallback for lock/unlock."
arch:
  - amd64
  - aarch64
startup: application
boot: auto
ports:
  8124/tcp: 8124
ports_description:
  8124/tcp: "HTTP API for lock/unlock/status"
options:
  eufy_username: ""
  eufy_password: ""
  eufy_country: "US"
  locks: "garage:T85D073325220419,side_door:T85D0733252706B7"
schema:
  eufy_username: "str"
  eufy_password: "password"
  eufy_country: "str"
  locks: "str"
